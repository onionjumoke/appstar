  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
      background-color: #eeeeee;
      color: #333;
      -webkit-text-size-adjust: none;
    }
    
    .header {
      background: -webkit-gradient(linear, left top, left bottom, from(#8a8a8a), to(#2d2d2d));
      color: white;
      text-align: center;
      padding: 10px 0;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 -1px 0 rgba(0,0,0,0.5);
      border-bottom: 1px solid #000;
    }
    
    .banner-container {
      width: 100%;
      height: 150px;
      position: relative;
      overflow: hidden;
    }
    
    .banner {
      width: 100%;
      height: 150px;
      background-color: #fafafa;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      -webkit-transition: opacity 1s ease-in-out;
    }
    
    .banner.hidden {
      opacity: 0;
    }
    
    .section-header {
      background: -webkit-gradient(linear, left top, left bottom, from(#f5f5f5), to(#dedede));
      padding: 10px;
      margin: 0;
      border-top: 1px solid #fff;
      border-bottom: 1px solid #b1b1b1;
      text-shadow: 0 1px 0 white;
      position: relative;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: bold;
      display: inline-block;
    }
    
    .see-more {
      float: right;
      font-size: 14px;
      color: #0066cc;
      text-decoration: none;
      text-shadow: 0 1px 0 white;
      font-weight: normal;
      padding-top: 3px;
    }
    
    .app-row {
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      padding: 10px 0;
      background-color: #f6f6f6;
      border-bottom: 1px solid #d0d0d0;
      -webkit-box-shadow: inset 0 1px 0 #fff;
      width: 100%;
    }
    
    .app {
      display: inline-block;
      width: 80px;
      margin: 0 10px;
      text-align: center;
      vertical-align: top;
    }
    
    .app-icon {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      margin: 0 auto;
      position: relative;
      -webkit-box-shadow: 0 2px 3px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .app-icon img {
      width: 100%;
      height: 100%;
      -webkit-border-radius: 12px;
    }
    
    .app-name {
      font-size: 12px;
      color: #333;
      margin: 5px 0 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 0 white;
    }
    
    .app-price {
      font-size: 11px;
      color: #999;
      text-shadow: 0 1px 0 white;
    }
    
    /* Special fix for iOS 3 scrolling */
    * {
      -webkit-touch-callout: none;
    }
    
    /* iOS 3 compatible scroll fix */
    .scrollable {
      -webkit-overflow-scrolling: touch;
      overflow-x: auto;
      overflow-y: hidden;
      width: 100%;
    }
  </style>
  <script type="text/javascript">
    window.onload = function() {
      // Banner rotation
      var banners = document.getElementsByClassName('banner');
      var currentBanner = 0;
      
      function rotateBanners() {
        // Hide all banners
        for (var i = 0; i < banners.length; i++) {
          banners[i].className = 'banner hidden';
        }
        
        // Show current banner
        banners[currentBanner].className = 'banner';
        
        // Increment counter
        currentBanner = (currentBanner + 1) % banners.length;
      }
      
      // Set initial banner
      rotateBanners();
      
      // Set interval for rotation
      setInterval(rotateBanners, 5000);

      // iOS 3 compatible touch scrolling fix
      var scrollDivs = document.getElementsByClassName('app-row');
      for (var i = 0; i < scrollDivs.length; i++) {
        scrollDivs[i].ontouchstart = function(e) {
          this.startX = e.touches[0].pageX;
          this.scrollLeft = this.scrollLeft;
          e.preventDefault();
        };
        
        scrollDivs[i].ontouchmove = function(e) {
          var touch = e.touches[0];
          var change = this.startX - touch.pageX;
          this.scrollLeft = this.scrollLeft + change;
          this.startX = touch.pageX;
          e.preventDefault();
        };
      }
    };
  </script>
</head>
