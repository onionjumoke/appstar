<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appstar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #e0e0e0;
            background-image: -webkit-gradient(linear, left top, left bottom, from(#f8f8f8), to(#e0e0e0));
            background-attachment: fixed;
            font-size: 90%;
        }
        
        .header {
            background-image: -webkit-gradient(linear, left top, left bottom, from(#656565), to(#2e2e2e));
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #222;
            -webkit-box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.5);
        }
        
        .app-container {
            margin: 12px auto;
            width: 85%;
            max-width: 700px;
            background-color: white;
            -webkit-border-radius: 10px;
            -webkit-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.9), inset 0 0 0 2px rgba(0, 0, 0, 0.05);
            padding: 20px;
            position: relative;
            border: 1px solid #c8c8c8;
        }
        
        .app-info {
            display: -webkit-box;
            -webkit-box-align: start;
        }
        
        .app-icon {
            width: 100px;
            height: 100px;
            -webkit-border-radius: 18px;
            margin-right: 15px;
            -webkit-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        
        .app-icon:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: -webkit-gradient(linear, left top, left bottom, from(rgba(255, 255, 255, 0.3)), to(rgba(255, 255, 255, 0)));
            -webkit-border-radius: 22px 22px 0 0;
        }
        
        .app-details {
            -webkit-box-flex: 1;
        }
        
        .app-name {
            font-size: 24px;
            font-weight: normal;
            margin-top: 3px;
            margin-bottom: 16px;
            color: #333;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .install-button {
            display: inline-block;
            background: -webkit-gradient(linear, left top, left bottom, from(#f9f9f9), to(#d8d8d8));
            border: 1px solid #aaa;
            -webkit-border-radius: 4px;
            padding: 6px 25px;
            font-size: 14px;
            color: #333;
            text-decoration: none;
            -webkit-box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .install-button:hover {
            background: -webkit-gradient(linear, left top, left bottom, from(#ffffff), to(#e6e6e6));
        }
        
        .install-button:active {
            background: -webkit-gradient(linear, left top, left bottom, from(#d8d8d8), to(#f0f0f0));
            -webkit-box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.15);
        }
        
        .app-image {
            width: 100%;
            max-width: 360px;
            height: 220px;
            margin: 18px auto;
            -webkit-box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 0, 0, 0.2);
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        .app-image:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: -webkit-gradient(linear, left top, left bottom, from(rgba(255, 255, 255, 0.15)), to(rgba(255, 255, 255, 0)));
        }
        
        .page-counter {
            text-align: center;
            color: #555;
            margin-top: 12px;
            font-size: 14px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">appstar</div>
    
    <div class="app-container">
        <div class="app-info">
            <div class="app-icon" style="background-image: url('https://app.star.is/resources/operamini.png');"></div>
            <div class="app-details">
                <h1 class="app-name">Minecraft (0.5.0, Armv7)</h1>
                <a href="https://app.star.is/resources/apps/operamini.ipa" class="install-button">INSTALL</a>
            </div>
        </div>
        
        <div class="app-image" style="background-image: url('http://app.star.is/resources/pages/thumbnails/operamini.png');"></div>
        
        <div class="page-counter">Copyright Opera, i don't own anything.</div>
    </div>
    
    <script>

        // Add subtle shine effect to skeuomorphic elements
        document.addEventListener('DOMContentLoaded', function() {
            const appContainer = document.querySelector('.app-container');
            const installButton = document.querySelector('.install-button');
            
            // Subtle shine effect on mouse move - iOS 3 compatible version
            document.addEventListener('mousemove', function(e) {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                installButton.style.backgroundImage = `-webkit-gradient(linear, left top, left bottom, 
                    from(rgba(255,255,255,${0.6 + x * 0.2})), 
                    to(rgba(216,216,216,${0.7 + y * 0.1})))`;
            });
        });
    </script>
</body>
</html>
